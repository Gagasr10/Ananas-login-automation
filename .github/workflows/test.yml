name: Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Create config.properties from secrets
        run: |
          mkdir -p src/test/resources
          echo "valid.email=${{ secrets.VALID_EMAIL }}" > src/test/resources/config.properties
          echo "valid.password=${{ secrets.VALID_PASSWORD }}" >> src/test/resources/config.properties
          echo "valid.email2=${{ secrets.VALID_EMAIL2 }}" >> src/test/resources/config.properties
          echo "valid.password2=${{ secrets.VALID_PASSWORD2 }}" >> src/test/resources/config.properties
          echo "app.url=https://ananas.rs/login" >> src/test/resources/config.properties
          echo "default.wait=10" >> src/test/resources/config.properties
          echo "short.wait=5" >> src/test/resources/config.properties

      - name: Run tests
        run: mvn clean test

      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-report
          path: extent-reports/

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs
          path: logs/